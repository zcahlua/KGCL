# Complete KGCL default configuration. Precedence: built-in defaults < this file < KGCL_* env vars < CLI.
dataset: uspto_50k
mode: train
root_dir: ./
experiments: BEST
use_rxn_class: false
kekulize: true
atom_message: false
use_attn: false
n_heads: 8
mpn_size: 256
depth: 10
dropout_mpn: 0.15
mlp_size: 512
dropout_mlp: 0.2
epochs: 200
lr: null
patience: 5
factor: 0.8
thresh: 0.01
max_clip: 10
train_batch_size: 1
preprocess_batch_size: 256
beam_size: 50
full_beam_size: 10
max_steps: 9
num_workers: 24
print_every: 200
preprocess_print_every: 1000
device: auto
