name: Lightweight tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lightweight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lightweight dependencies
        run: python -m pip install -e '.[test,dev]'
      - name: Run unit tests
        run: python -m pytest tests/unit -q
      - name: Run smoke tests
        run: python -m pytest tests/smoke -q
      - name: Run lightweight compatibility tests
        run: python -m pytest tests/compatibility -q
      - name: Verify binary hashes
        run: python -m pytest tests/compatibility/test_binary_assets.py -q
      - name: Ruff check
        run: ruff check src/kgcl tests
      - name: Compile package
        run: python -m compileall src
      - name: Build wheel
        run: python -m build
      - name: Install wheel in clean venv and check console help
        run: |
          python -m venv /tmp/kgcl-wheel-smoke
          /tmp/kgcl-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/kgcl-wheel-smoke/bin/kgcl-train --help
          /tmp/kgcl-wheel-smoke/bin/kgcl-preprocess --help
          /tmp/kgcl-wheel-smoke/bin/kgcl-prepare-data --help
          /tmp/kgcl-wheel-smoke/bin/kgcl-canonicalize --help
          /tmp/kgcl-wheel-smoke/bin/kgcl-eval --help
          /tmp/kgcl-wheel-smoke/bin/kgcl-eval-full --help
          /tmp/kgcl-wheel-smoke/bin/kgcl-eval-rtacc --help

  runtime-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install runtime dependencies
        run: python -m pip install -e '.[runtime,test]'
      - name: Runtime tests
        run: |
          python -m pytest tests/runtime -q
          python -m pytest tests/compatibility -q
