name: CUDA Runtime

on:
  workflow_dispatch:

jobs:
  cuda-runtime:
    runs-on: [self-hosted, linux, x64, gpu]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify NVIDIA driver
        run: nvidia-smi
      - name: Install CUDA PyTorch and KGCL
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cu121
          python -m pip install -e ".[runtime,test,dev]"
      - name: Verify CUDA PyTorch
        run: python -c "import torch; assert torch.version.cuda is not None; assert torch.cuda.is_available(); print(torch.cuda.get_device_name(0))"
      - name: Runtime tests
        run: python -m pytest tests/runtime -q -m runtime
      - name: CUDA tests
        run: python -m pytest tests/cuda -q -m cuda
      - name: Compatibility tests
        run: python -m pytest tests/compatibility -q
