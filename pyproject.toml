[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kgcl"
version = "0.1.0"
description = "KGCL retrosynthesis workflows"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PyYAML>=6.0",
]

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["kgcl*", "models*", "utils*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[project.scripts]
kgcl-train = "kgcl.cli.entrypoints:train"
kgcl-preprocess = "kgcl.cli.entrypoints:preprocess"
kgcl-prepare-data = "kgcl.cli.entrypoints:prepare_data"
kgcl-eval = "kgcl.cli.entrypoints:evaluate"
kgcl-eval-full = "kgcl.cli.entrypoints:evaluate_full"
kgcl-eval-rtacc = "kgcl.cli.entrypoints:evaluate_round_trip"
kgcl-canonicalize = "kgcl.cli.entrypoints:canonicalize"

