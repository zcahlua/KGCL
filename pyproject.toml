[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kgcl"
version = "0.1.0"
description = "KGCL retrosynthesis workflows"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PyYAML>=6.0",
]

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["kgcl*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
